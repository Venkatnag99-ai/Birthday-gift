<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #fff;
    }

    .container {
      padding: 20px;
      max-width: 90%;
    }

    h1 {
      font-size: 2.5rem;
    }

    p {
      font-size: 1.2rem;
      margin: 15px 0;
    }

    button {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 25px;
      background: #fff;
      color: #ff6f91;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff6f91;
      color: white;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎂 Happy Birthday! 🎉</h1>
  <p>Wishing you a day filled with love, joy, and laughter!</p>
  <p>May all your dreams come true 💖</p>

  <button onclick="startConfetti()">Celebrate 🎊</button>
</div>

<!-- Confetti Script -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
  function startConfetti() {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });
  }

  // Auto start confetti on load
  window.onload = function() {
    startConfetti();
  };
</script>

</body>
</html>
